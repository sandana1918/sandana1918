<svg width="880" height="240" viewBox="0 0 880 240" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="tg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c6cf0"/><stop offset="0.5" stop-color="#fb7185"/><stop offset="1" stop-color="#34d399"/>
    </linearGradient>
  </defs>

  <!-- panel -->
  <rect x="8" y="8" width="864" height="224" rx="14" fill="#0d1117" stroke="#1f2630" stroke-width="1.5"/>
  <!-- title bar -->
  <circle cx="36" cy="36" r="6" fill="#fb7185"/>
  <circle cx="56" cy="36" r="6" fill="#fbbf6b"/>
  <circle cx="76" cy="36" r="6" fill="#34d399"/>
  <text x="440" y="41" text-anchor="middle" font-size="13" fill="#5b6472">sandana@dev — zsh — 80×24</text>
  <line x1="8" y1="56" x2="872" y2="56" stroke="#1f2630" stroke-width="1.5"/>

  <!-- boot log (reveals line by line, once on load) -->
  <g font-size="16">
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.25s" begin="0.1s" fill="freeze"/>
      <text x="36" y="96"><tspan fill="#34d399">$</tspan> <tspan fill="#c7cdf5">./launch-sandana.sh</tspan></text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.25s" begin="0.7s" fill="freeze"/>
      <text x="36" y="128"><tspan fill="#7c6cf0">▸</tspan> <tspan fill="#8b93a7">mounting full-stack toolchain ............ </tspan><tspan fill="#34d399">ok</tspan></text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.25s" begin="1.3s" fill="freeze"/>
      <text x="36" y="160"><tspan fill="#7c6cf0">▸</tspan> <tspan fill="#8b93a7">waking the AI services .................. </tspan><tspan fill="#34d399">ok</tspan></text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.25s" begin="1.9s" fill="freeze"/>
      <text x="36" y="192"><tspan fill="#7c6cf0">▸</tspan> <tspan fill="#8b93a7">connecting distributed services ........ </tspan><tspan fill="#fb7185">live</tspan></text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.25s" begin="2.6s" fill="freeze"/>
      <text x="36" y="224" font-size="17"><tspan fill="url(#tg)" font-weight="bold">✦ sandana sureshvaran</tspan> <tspan fill="#5b6472">:: ready to build</tspan></text>
      <rect x="410" y="211" width="9" height="16" fill="#34d399">
        <animate attributeName="opacity" values="1;0;1" dur="1s" begin="2.9s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>
</svg>
