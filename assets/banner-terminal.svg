<svg viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sandana Sureshvaran — Full-Stack and Systems Engineer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#141a2e"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#7C6CF0" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#7C6CF0" stop-opacity="0"/>
    </radialGradient>
    <style>
      .mono { font-family: 'JetBrains Mono','Consolas',ui-monospace,monospace; }
      .prompt { fill: #34d399; }
      .cmd    { fill: #e6e9f2; }
      .flag   { fill: #9aa4ff; }
      .str    { fill: #fb7185; }
      .comment{ fill: #6b7280; }
      .key    { fill: #7C6CF0; }
    </style>
  </defs>

  <rect width="1200" height="260" fill="url(#bg)"/>
  <rect width="1200" height="260" fill="url(#glow)"/>

  <!-- terminal window -->
  <rect x="40" y="26" width="1120" height="208" rx="12" fill="#0a0e16" stroke="#1f2633" stroke-width="1.5"/>
  <!-- title bar -->
  <rect x="40" y="26" width="1120" height="34" rx="12" fill="#161b26"/>
  <rect x="40" y="48" width="1120" height="12" fill="#161b26"/>
  <circle cx="64"  cy="43" r="6" fill="#fb7185"/>
  <circle cx="86"  cy="43" r="6" fill="#fbbf24"/>
  <circle cx="108" cy="43" r="6" fill="#34d399"/>
  <text class="mono" x="600" y="47" font-size="13" fill="#6b7280" text-anchor="middle">sandana@dev: ~/profile</text>

  <!-- terminal body -->
  <g class="mono" font-size="17">
    <text x="68" y="98">
      <tspan class="prompt">➜</tspan><tspan class="key">  ~/profile</tspan><tspan class="cmd"> whoami</tspan>
    </text>
    <text x="68" y="128" class="cmd" font-size="26" font-weight="700">Sandana Sureshvaran</text>
    <text x="68" y="158" class="comment"># Full-Stack &amp; Systems Engineer</text>

    <text x="68" y="196">
      <tspan class="prompt">➜</tspan><tspan class="key">  ~/profile</tspan><tspan class="cmd"> cat stack.txt</tspan>
    </text>
    <text x="68" y="222">
      <tspan class="str">"React"</tspan><tspan class="comment"> → </tspan><tspan class="str">"Node"</tspan><tspan class="comment"> → </tspan><tspan class="str">"FastAPI"</tspan><tspan class="comment"> → </tspan><tspan class="str">"Docker"</tspan><tspan class="comment"> → </tspan><tspan class="str">"Kubernetes"</tspan><tspan class="flag"> --reliable --secure</tspan>
    </text>

    <!-- blinking cursor -->
    <rect x="68" y="240" width="11" height="3" fill="#34d399">
      <animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
