<svg viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sandana Sureshvaran — Full-Stack and Systems Engineer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#141a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7C6CF0"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7C6CF0" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#7C6CF0" stop-opacity="0"/>
    </radialGradient>
    <style>
      .name { font: 700 46px 'Segoe UI','Helvetica Neue',Arial,sans-serif; fill: #f0f1f6; letter-spacing: 0.5px; }
      .role { font: 500 20px 'JetBrains Mono','Consolas',monospace; fill: #8b93a7; letter-spacing: 1px; }
      .node { fill: #7C6CF0; }
      .node-d { fill: #FB7185; }
    </style>
  </defs>

  <rect width="1200" height="260" fill="url(#bg)"/>
  <ellipse cx="980" cy="130" rx="380" ry="220" fill="url(#glow)"/>

  <!-- network motif (right side) -->
  <g stroke="#7C6CF0" stroke-opacity="0.5" stroke-width="1.5" fill="none">
    <line x1="820" y1="60"  x2="930" y2="120"/>
    <line x1="930" y1="120" x2="1040" y2="70"/>
    <line x1="930" y1="120" x2="1010" y2="190"/>
    <line x1="1010" y1="190" x2="1110" y2="150"/>
    <line x1="1040" y1="70"  x2="1130" y2="110"/>
    <line x1="820" y1="60"  x2="860" y2="170"/>
    <line x1="860" y1="170" x2="1010" y2="190"/>
    <line x1="1040" y1="70"  x2="930" y2="120"/>
  </g>
  <g>
    <circle class="node" cx="930"  cy="120" r="8"/>
    <circle class="node" cx="820"  cy="60"  r="5"/>
    <circle class="node-d" cx="1040" cy="70"  r="6"/>
    <circle class="node" cx="1010" cy="190" r="6"/>
    <circle class="node" cx="860"  cy="170" r="4"/>
    <circle class="node-d" cx="1110" cy="150" r="5"/>
    <circle class="node" cx="1130" cy="110" r="4"/>
  </g>

  <!-- accent bar -->
  <rect x="70" y="92" width="6" height="76" rx="3" fill="url(#accent)"/>

  <!-- text -->
  <text class="name" x="98" y="120">Sandana Sureshvaran</text>
  <text class="role" x="100" y="158">Full-Stack &amp; Systems Engineer</text>
</svg>
